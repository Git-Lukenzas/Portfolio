<!DOCTYPE html>
<html>
  <head>
    <Style>
      .text {
        width: 200px;
        display: inline-block;
      }
      button {
        vertical-align: middle;
        margin-bottom: 40px;
        border-radius: 5px;
        border: solid;
        border-color: gray;
        border-width: 1px;
      }
    </Style>
  </head>
  <body>
    <p class="text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
    <button class="yes">Yes</button>
    <button class="yes">No</button>
  </body>
</html>
