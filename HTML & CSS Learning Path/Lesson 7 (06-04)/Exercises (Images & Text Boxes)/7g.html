<!DOCTYPE html>
<html>
  <head>
    <title>Twitter Text Box</title>
    <style>
    
      .profile-picture {
        vertical-align: middle;
        border-radius: 50%;
        object-fit: cover;
        width: 50px;
        height: 50px;
      }

      .text {
        vertical-align: middle;
        font-family: roboto;
        color: rgb(96, 96, 96);
        font-size: 18px;
        border: none;
        margin-left:5px;
        width: 320px;
        height: 50px;
      }

      .button-tweet {
        margin-left: 0px;
        margin-right: 0px;
        font-family: roboto;
        border: none;
        background-color: rgb(90, 173, 255);
        color:white;
        font-weight: bold;
        font-size: 18px;
        padding-top: 6px;
        padding-bottom: 6px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 15px;
        cursor: pointer;
        transition: opacity 0.15s;

      }

      .button-tweet:hover {
        opacity: 0.7;
      }
      
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  </head>
  <body>
    <img class="profile-picture" src="cat.jpg">
    <input class="text" placeholder="What's happening?">
    <button class="button-tweet">Tweet</button>
  </body>
</html>
