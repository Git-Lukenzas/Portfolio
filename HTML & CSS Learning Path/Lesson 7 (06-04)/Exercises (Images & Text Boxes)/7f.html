<!DOCTYPE html>
<html>
  <head>
    
    <title> LinkedIn Signup </title>

    <Style>
      
      button {
        margin-top:0;
        margin-bottom: 0;
      }

      p {
        margin-top:0;
        margin-bottom: 0;
        color: rgb(96, 96, 96);
        font-family: roboto;
      }

      .email-text {
        font-size:14px;
        margin-bottom: 5px;;
      }

      .email-input {
        border-radius:5px;
        width:340px;
        height: 25px;
        border: solid;
        border-width: 1px;
        border-color: rgb(79, 78, 78);
        margin-bottom: 15px;
      }

      .privacy-text {
        font-size:14px;
        margin-bottom: 15px;;
      }

      .agree-button {
        border: none;
        background-color: rgb(18, 117, 237);
        color: white;
        font-size: 17px;
        padding-bottom: 15px;
        padding-top: 15px;
        padding-left: 122px;
        padding-right:122px;
        border-radius: 60px;
        cursor: pointer;

        transition: opacity 0.15s;
      }

      .agree-button:hover {
        opacity:0.7;
      }

    </Style>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    
  </head>
  <body>

    <p class="email-text"> Email </p>

    <input class="email-input" type="text">

    <p class="privacy-text"> By clicking Agree & Join, you agree to the Privacy Policy. </p>

    <button class="agree-button"> Agree & Join </button>

  </body>
</html>
