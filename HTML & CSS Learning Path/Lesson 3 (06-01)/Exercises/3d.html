<!-- Bootstrap buttons -->

<style>
  .get-started-button{
    width: 120px;
    height: 40px;
    font-weight: bold;
    font-size: 14px;
    color: white;
    background-color: rgb(121, 82, 179);
    border: none;
    border-radius: 4px;
    cursor:pointer;
    margin-right: 5px;
    transition: background-color 0.15s;
  }

  .get-started-button:hover {
    background-color:rgb(106, 73, 155);
  }

  .download-button{
    width: 115px;
    height: 40px;
    font-weight: bold;
    font-size: 14px;
    color: rgb(108, 117, 125);
    background-color: white;
    border-radius: 4px;
    border-width: 1px;
    border-color: rgb(108, 117, 125);
    cursor: pointer;
    border-style: solid;
    
    transition: background-color 0.15s, color 0.15s;
  }

  .download-button:hover {
    background-color: rgb(108, 117, 125);
    color: white;
  }

</style>

<button class="Get-started-button">
  Get started
</button>

<button class="download-button">
  Download
</button>
