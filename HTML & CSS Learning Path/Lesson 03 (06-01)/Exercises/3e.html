<!-- LinkedIn buttons -->

<style>
  .apply-button{
    width: 230px;
    height: 40px;
    border: none;
    background-color: rgb(10, 102, 194);
    color: white;
    font-weight: bold;
    font-size: 14px;
    border-radius: 20px;
    margin-right: 8px;
    cursor: pointer;

    transition: background-color 0.15s;
  }

  .apply-button:hover {
    background-color:rgb(8, 82, 156);
  }

  .save-button{
    height: 40px;
    width: 85px;
    background-color: white;
    color: rgb(10, 102, 194);
    border-color: rgb(10, 102, 194);
    border-style: solid;
    border-width: 2px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;

    transition: background-color 0.15s,
      border-width 0.15s;
  }

  .save-button:hover {
    background-color:rgb(223, 238, 244);
    border-width: 3px;
  }

</style>

<button class="apply-button">
  Apply on company website
</button>

<button class="save-button">
  Save
</button>
