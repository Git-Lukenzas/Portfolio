<!-- Recreate stretch button design -->

<style>
  .stretch-button {
    font-weight: none;
    color: white;
    background-color:green;
    border: none;
    padding-top:5px;
    padding-bottom:5px;
    padding-right:11px;
    padding-left:11px;
    cursor:pointer;
    font-size: 12px;
    transition: padding-top 1s,
      padding-bottom 1s,
      padding-right 1s,
      padding-left 1s;
  }

  .stretch-button:hover {
    padding-top:15px;
    padding-bottom:15px;
    padding-left: 33px;
    padding-right: 33px;
  }
</style>

<button class="stretch-button">
  Stretch
</button>
