<!-- Margin and padding together -->


<style>
  .button {
    background-color: green;
    color: white;
    border: none;
    font-size: 30px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 20px;
    padding-right: 20px;
    margin-left: 24px;
    margin-right: 24px;
    cursor:pointer;
    transition: padding-left 0.15s,
      padding-right 0.15s,
      margin-left 0.15s,
      margin-right 0.15s;
  }

  .button:hover {
    padding-left: 30px;
    padding-right: 30px;
    margin-left: 14px;
    margin-right: 14px;
  }
</style>

<button class="button">
  One
</button>

<button class="button">
  Two
</button>

<button class="button">
  Three
</button>
