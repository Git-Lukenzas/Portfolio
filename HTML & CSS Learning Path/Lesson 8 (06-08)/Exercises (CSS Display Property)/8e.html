<!DOCTYPE html>
<html>
  <head>
    <style>
      .title {
        margin-top: 0px;
        margin-bottom: 20px;
        font-family: roboto;
        font-size: 40px;
      }
      .info-1 {
        display:block;
        border: none;
        background-color: rgb(230, 230, 230);
        font-family: roboto;
        margin-bottom: 5px;
        width: 400px;
        height: 38px;
        padding-left: 15px;
      }
      .info-2 {
        display:block;
        border: none;
        background-color: rgb(230, 230, 230);
        font-family: roboto;
        margin-bottom: 25px;
        width: 400px;
        height: 38px;
        padding-left: 15px;
      }
      .request {
        border: none;
        color: white;
        background-color: black;
        padding-bottom: 12px;
        padding-top: 12px;
        padding-left: 16px;
        padding-right: 16px;
        margin-right: 10px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .schedule {
        border: none;
        color: black;
        background-color: rgb(230, 230, 230);
        padding-bottom: 12px;
        padding-top: 12px;
        padding-left: 16px;
        padding-right: 16px;
        margin-right: 10px;
        cursor: pointer;
        transition: background-color 0.15s;
      }
      .request:hover {
        opacity: 0.7;
      }
      .schedule:hover {
        background-color:rgb(186, 186, 186);
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <p class="title">
      Request a ride now
    </p>
    <input class="info-1" type="text" placeholder="Enter pickup location">
    <input class="info-2" type="text" placeholder="Ender destination">
    <button class="request">Request now</button>
    <button class="schedule">Schedule for later</button>
  </body>
</html>
