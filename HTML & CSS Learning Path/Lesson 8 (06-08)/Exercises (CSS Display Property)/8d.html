<!DOCTYPE html>
<html>
  <head>
    <style>
      .email,
      .sign-up {
        display: block;
      }

      .credentials {
        width: 120px;
        height: 25px;
        margin-bottom: 10px;
        border: solid;
        border-color: gray;
        border-radius: 5px;
        border-width: 1px;
        padding-left: 10px;
        padding-bottom: 5px;
        padding-top: 5px;
      }

      .email {
        height: 25px;
        padding-left: 10px;
        padding-bottom: 5px;
        padding-top: 5px;
        border: solid;
        border-color: gray;
        border-radius: 5px;
        border-width: 1px;
        margin-bottom: 10px;
        width: 259px;
      }

      .sign-up {
        border: none;
        background-color: rgb(67, 155, 255);
        color:white;
        padding-left: 113px;
        padding-right: 113px;
        padding-bottom: 10px;
        padding-top: 10px;
        border-radius: 8px;
        font-weight: bold;
        transition: opacity 0.15s;
        cursor: pointer;
      }

      .sign-up:hover {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <input class="credentials" type="text" placeholder="First name">
    <input class="credentials" type="text" placeholder="Last name">
    <input class="email" type="text" placeholder="Email">
    <button class="sign-up">Sign Up</button>
  </body>
</html>
