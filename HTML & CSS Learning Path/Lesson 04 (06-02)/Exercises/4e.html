<!-- LinkedIn buttons -->

<style>
  .apply-button{
    vertical-align: top;
    padding-top:12px;
    padding-bottom:12px;
    padding-right:22px;
    padding-left:22px;
    border: none;
    background-color: rgb(10, 102, 194);
    color: white;
    font-weight: bold;
    font-size: 14px;
    border-radius: 20px;
    margin-right: 8px;
    cursor: pointer;

    transition: background-color 0.15s;
  }

  .apply-button:hover {
    background-color:rgb(8, 82, 156);
  }

  .save-button{
    vertical-align: top;
    padding-top:11px;
    padding-bottom:11px;
    padding-right:25px;
    padding-left:25px;
    background-color: white;
    color: rgb(10, 102, 194);
    border-color: rgb(10, 102, 194);
    border-style: solid;
    border-width: 1px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;

    transition: border-width 0.15s,
      background-color 0.15s;
  }

  .save-button:hover {
    background-color:rgb(223, 238, 244);
    border-width: 2px;
  }

</style>

<button class="apply-button">
  Apply on company website
</button>

<button class="save-button">
  Save
</button>
