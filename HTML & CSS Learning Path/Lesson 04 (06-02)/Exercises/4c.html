<!-- GitHub Sign Up button-->

<style>
  .sign-up-button{
    background-color: rgb(46, 164, 79);
    border: none;
    border-radius: 5px;
    padding-left: 17px;
    padding-right: 17px;
    padding-top: 10px;
    padding-bottom: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    transition: box-shadow 0.15s;
  }

  .sign-up-button:hover {
    box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
  }

</style>

<button class="sign-up-button">
  Sign Up
</button>
