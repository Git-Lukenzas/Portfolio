<!-- 3D Click button -->

<style>
  .shadow-button {
    font-weight: none;
    color: white;
    background-color:green;
    border: none;
    padding-top:8px;
    padding-bottom:8px;
    padding-right:20px;
    padding-left:20px;
    cursor:pointer;
    font-size: 22px;
    box-shadow: 5px 5px 3px rgba(0, 0, 0, 0.15);
  }

  .shadow-button:active {
    margin-top: 5px;
    margin-left: 5px;
    box-shadow: none;
  }
</style>

<button class="shadow-button">
  Shadow
</button>
