<!-- LinkedIn buttons -->

<style>
  .apply-button{
    width: 230px;
    height: 40px;
    border: none;
    background-color: rgb(10, 102, 194);
    color: white;
    font-weight: bold;
    font-size: 14px;
    border-radius: 20px;
    margin-right: 8px;
    cursor: pointer;
  }

  .save-button{
    height: 40px;
    width: 85px;
    background-color: white;
    color: rgb(10, 102, 194);
    border-color: rgb(10, 102, 194);
    border-style: solid;
    border-width: 1px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
</style>

<button class="apply-button">
  Apply on company website
</button>

<button class="save-button">
  Save
</button>
