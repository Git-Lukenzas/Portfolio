<!--Amazon button-->

<style>
  .amazon-button{
    height:36px;
    width:180px;
    border-radius:20px;
    color: black;
    background-color:rgb(255, 216, 20);
    border: none;
    font-size:14px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.15s;
  }

  .amazon-button:hover {
    background-color: rgb(255, 200, 20)
  }

</style>

<button class="amazon-button">
  Add to Cart
</button>
